<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎹 练琴星球</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: #0f0a1e;
  color: #fff;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

#app { position: relative; z-index: 1; min-height: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; }
#view-content { flex: 1; overflow-y: auto; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }

/* iPad / large-screen: wider app shell */
@media (min-width: 768px) {
  #app { max-width: 540px; }
}

/* Ensure tab bar never overlaps content on any device */
.tab-bar-spacer { height: calc(80px + env(safe-area-inset-bottom, 0px)); flex-shrink: 0; }

.starfield {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, #0d1a3a 0%, transparent 50%), #0f0a1e;
}
.starfield::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 70%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 38%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 62%, rgba(255,255,255,.45) 0%, transparent 100%);
}

.glass {
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px;
}
.glass-dark {
  background: rgba(15,10,30,.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(167,139,250,.2);
  border-radius: 20px;
}

.fredoka { font-family: 'Fredoka One', cursive; }

@keyframes float     { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
@keyframes wiggle    { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
@keyframes shake     { 0%,100%{transform:translate(0,0) rotate(0)} 25%{transform:translate(-3px,0) rotate(-3deg)} 75%{transform:translate(3px,0) rotate(3deg)} }
@keyframes crackglow { 0%,100%{filter:drop-shadow(0 0 8px #fbbf24)} 50%{filter:drop-shadow(0 0 22px #f59e0b)} }
@keyframes popin     { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.1) rotate(4deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes shimmer   { 0%{background-position:-200% center} 100%{background-position:200% center} }
@keyframes glowpulse { 0%,100%{box-shadow:0 0 20px rgba(167,139,250,.25)} 50%{box-shadow:0 0 42px rgba(167,139,250,.55)} }
@keyframes combofly  { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-55px);opacity:0} }
@keyframes notefall  { from{transform:translateY(-70px);opacity:0} 6%{opacity:1} to{transform:translateY(var(--fd));opacity:1} }
@keyframes notehit   { 0%{transform:scale(1);opacity:1} 60%{transform:scale(1.4);opacity:.6} 100%{transform:scale(.2);opacity:0} }

.anim-float    { animation: float 3s ease-in-out infinite; }
.anim-wiggle   { animation: wiggle .5s ease-in-out infinite; }
.anim-shake    { animation: shake .3s ease-in-out infinite; }
.anim-crack    { animation: crackglow 1.5s ease-in-out infinite; }
.anim-popin    { animation: popin .5s cubic-bezier(.175,.885,.32,1.275) forwards; }
.anim-glowpulse{ animation: glowpulse 2.2s ease-in-out infinite; }

.progress-fill {
  background: linear-gradient(90deg,#a78bfa,#f472b6,#a78bfa);
  background-size: 200% auto;
  animation: shimmer 2s linear infinite;
  height: 100%; border-radius: 99px;
  transition: width .5s ease;
}

.tab-bar  { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0px); }
@media (min-width: 768px) { .tab-bar { max-width: 540px; } }
.tab-inner{ margin: 6px 10px; background: rgba(15,10,30,.88); backdrop-filter: blur(16px); border: 1px solid rgba(167,139,250,.2); border-radius: 20px; padding: 6px 4px; display: flex; gap: 2px; }
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 2px; cursor:pointer; border-radius:14px; transition:background .2s; user-select:none; }
.tab-item.active { background: rgba(167,139,250,.15); }
.tab-icon { font-size:20px; transition:transform .2s; }
.tab-item.active .tab-icon { transform:scale(1.15); }
.tab-label{ font-size:9px; font-weight:700; color:rgba(255,255,255,.35); transition:color .2s; }
.tab-item.active .tab-label { color:#a78bfa; }

.btn { border:none; cursor:pointer; font-family:inherit; font-weight:700; border-radius:14px; transition:transform .14s, opacity .14s; display:inline-flex; align-items:center; justify-content:center; }
.btn:active { transform:scale(.95); }

.hit-key { border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; user-select:none; border:2px solid; transition:all .1s; font-family:inherit; font-weight:800; padding:6px 2px; background:none; }
.hit-key.pressed { filter:brightness(1.7); transform:scale(.92); box-shadow:0 0 18px currentColor; }

.note-block { position:absolute; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; pointer-events:none; animation:notefall var(--fd-dur,2s) linear forwards; }

.judgment-popup { position:fixed; left:50%; transform:translateX(-50%); font-weight:900; pointer-events:none; animation:combofly .85s ease forwards; white-space:nowrap; text-shadow:0 2px 8px rgba(0,0,0,.5); z-index:80; }

.cal-day  { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.cal-done { background:rgba(52,211,153,.2); color:#34d399; border:1px solid rgba(52,211,153,.3); }
.cal-today{ outline:2px solid #a78bfa; }
.cal-empty{ background:rgba(255,255,255,.04); color:rgba(255,255,255,.2); }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); backdrop-filter:blur(8px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }

.rarity-common { background:#374151; color:#9ca3af; }
.rarity-rare   { background:#1d4ed8; color:#93c5fd; }
.rarity-epic   { background:linear-gradient(135deg,#7c3aed,#db2777); color:#fff; }
.rarity-legend { background:linear-gradient(135deg,#b45309,#d97706); color:#fef3c7; }

input[type=range]{ accent-color:#a78bfa; cursor:pointer; }
::-webkit-scrollbar{ width:5px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:rgba(167,139,250,.35); border-radius:99px; }
</style>
</head>
<body>
<div class="starfield"></div>
<div id="app">
  <div id="view-content"></div>
  <div class="tab-bar" id="tab-bar"></div>
</div>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CONSTANTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const XP_LEVELS  = [0, 150, 400, 800, 1500];
const EGG_STAGES = ['沉睡中','轻微颤动','出现裂缝','破壳前夕','✨ 满级'];
const EGG_ANIMS  = ['anim-float','anim-wiggle','anim-wiggle','anim-shake','anim-crack'];

const NOTE_NAMES  = ['Do','Re','Mi','Fa','Sol','La','Si'];
const NOTE_COLORS = ['#f87171','#fb923c','#fbbf24','#4ade80','#60a5fa','#a78bfa','#f472b6'];
const NOTE_FREQS  = [261.63,293.66,329.63,349.23,392.00,440.00,493.88];
const KEY_LABELS  = ['A','S','D','F','G','H','J'];

const TIPS = [
  '慢速练习是进步最快的方式，先把每个音弹准确再提速。',
  '新曲子先单手练，左右手都熟了再合并。',
  '练习前先听一遍整首曲子，建立对音乐的整体感受。',
  '遇到困难的地方，单独截出来反复练习，攻克它！',
  '保持手腕放松，不要紧绷——想象手心里握着一个苹果。',
  '每次练完，试试从头到尾完整弹一遍，培养演奏感。',
  '节拍器是你最好的朋友，哪怕很慢也要跟着拍子弹。',
];

const SONGS = [
  { name:'自由模式（随机无限）', seq: null },
  { name:'小星星', seq:[0,0,4,4,5,5,4,3,3,2,2,1,1,0,4,4,3,3,2,2,1,4,4,3,3,2,2,1,0,0,4,4,5,5,4,3,3,2,2,1,1,0] },
  { name:'玛丽有只小羊羔', seq:[2,1,0,1,2,2,2,1,1,1,2,4,4,2,1,0,1,2,2,2,2,1,1,2,1,0] },
  { name:'生日快乐', seq:[0,0,1,0,3,2,0,0,1,0,4,3,0,0,0,5,3,2,1,6,6,5,3,4,3] },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PET DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PETS_R = {
  common: [
    {id:'c1',emoji:'🐱',name:'音符小猫',  color:'#8b5cf6',power:80},
    {id:'c2',emoji:'🐰',name:'节拍兔',    color:'#ec4899',power:90},
    {id:'c3',emoji:'🐸',name:'哼歌青蛙',  color:'#10b981',power:85},
    {id:'c4',emoji:'🐹',name:'练习仓鼠',  color:'#f59e0b',power:75},
    {id:'c5',emoji:'🦔',name:'刺猬琴手',  color:'#6366f1',power:88},
  ],
  rare: [
    {id:'r1',emoji:'🦊',name:'魔法赤狐',    color:'#f97316',power:220},
    {id:'r2',emoji:'🦋',name:'旋律蝴蝶',    color:'#a78bfa',power:240},
    {id:'r3',emoji:'🐬',name:'海豚音姬',    color:'#06b6d4',power:210},
    {id:'r4',emoji:'🦉',name:'夜曲猫头鹰',  color:'#8b5cf6',power:250},
  ],
  epic: [
    {id:'e1',emoji:'🐉',name:'韵律龙王',   color:'#7c3aed',power:600},
    {id:'e2',emoji:'🦄',name:'星光独角兽', color:'#ec4899',power:650},
    {id:'e3',emoji:'🔥',name:'烈焰凤凰',   color:'#ef4444',power:700},
  ],
  legend: [
    {id:'l1',emoji:'✨',name:'宇宙乐神', color:'#fbbf24',power:1500},
  ],
};
const ALL_PETS = [...PETS_R.common,...PETS_R.rare,...PETS_R.epic,...PETS_R.legend];

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function petById(id){ return ALL_PETS.find(p=>p.id===id); }
function drawPet(streak){
  const r = Math.random() + streak*0.01;
  if(r>1.08) return PETS_R.legend[0];
  if(r>0.85) return rnd(PETS_R.epic);
  if(r>0.55) return rnd(PETS_R.rare);
  return rnd(PETS_R.common);
}
function hexRgb(hex){
  return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16);
}
// XSS防护：所有用户输入渲染到HTML前必须经过此函数
function esc(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function defaultState(){
  return { name:'', eggXp:0, totalMinutes:0, streak:0, lastPracticeDate:'',
           collectedPets:[], checkinDays:[], gameHighScore:0,
           settings:{ bpm:90, checkInterval:300 } };
}
let S = (()=>{
  try{ const r=localStorage.getItem('piano_pet_v3'); if(r) return JSON.parse(r); }catch(_){}
  return defaultState();
})();
function save(){ try{ localStorage.setItem('piano_pet_v3',JSON.stringify(S)); }catch(_){} }

function eggLevel(){
  let lv=0;
  for(let i=0;i<XP_LEVELS.length;i++) if(S.eggXp>=XP_LEVELS[i]) lv=i;
  return lv;
}
function eggMax(){ return eggLevel()>=XP_LEVELS.length-1; }
function xpPct(){
  const lv=eggLevel();
  if(eggMax()) return 100;
  return Math.min(100,((S.eggXp-XP_LEVELS[lv])/(XP_LEVELS[lv+1]-XP_LEVELS[lv]))*100);
}
function addXp(n){ S.eggXp+=n; save(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function recordDay(){
  const today=todayStr();
  if(S.lastPracticeDate===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yStr=y.toISOString().slice(0,10);
  S.streak = S.lastPracticeDate===yStr ? S.streak+1 : 1;
  S.lastPracticeDate=today;
  if(!S.checkinDays.includes(today)) S.checkinDays.push(today);
  save();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUDIO
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let audioCtx=null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// Metronome
let metroOn=false, metroIv=null, metroNext=0, metroBeat=0;
function metroClick(t,accent){
  const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value=accent?1200:800; o.type='sine';
  g.gain.setValueAtTime(accent?.45:.28,t);
  g.gain.exponentialRampToValueAtTime(.001,t+.08);
  o.start(t); o.stop(t+.08);
}
function metroTick(){
  const ctx=getCtx();
  while(metroNext<ctx.currentTime+.1){
    metroClick(metroNext,metroBeat%4===0);
    metroNext+=60/S.settings.bpm; metroBeat++;
  }
}
function startMetro(){
  const ctx=getCtx(); metroNext=ctx.currentTime+.05; metroBeat=0;
  metroOn=true; metroIv=setInterval(metroTick,25);
}
function stopMetro(){ clearInterval(metroIv); metroOn=false; metroBeat=0; }
function toggleMetro(){ metroOn?stopMetro():startMetro(); refreshPractice(); }
function restartMetro(){
  if(!metroOn) return;
  clearInterval(metroIv);
  const ctx=getCtx(); metroNext=ctx.currentTime+.05; metroBeat=0;
  metroIv=setInterval(metroTick,25);
}

function playChime(){
  try{
    const ctx=getCtx();
    [880,1100,1320].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value=f; o.type='sine';
      const t=ctx.currentTime+i*.12;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.3,t+.05);
      g.gain.exponentialRampToValueAtTime(.001,t+.7); o.start(t); o.stop(t+.7);
    });
  }catch(_){}
}
function playNoteSound(i){
  try{
    const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.frequency.value=NOTE_FREQS[i]; o.type='triangle';
    g.gain.setValueAtTime(.35,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+.45);
  }catch(_){}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ROUTER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentView = S.name?'home':'setup';
function navigate(view){
  if(currentView==='practice') stopPractice();
  if(currentView==='game'&&gameState==='playing') endGame();
  currentView=view; render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PRACTICE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let isPracticing=false, practiceTimer=null, practiceSeconds=0;
let combo=0, postureTimeout=null, showPosture=false;

// Partial refresh: only update inner HTML, keep timer ticking
function refreshPractice(){
  if(currentView!=='practice') return;
  const el=document.getElementById('view-content');
  if(el){ el.innerHTML=buildPractice(); afterPracticeRender(); }
}

function startPractice(){
  isPracticing=true; recordDay(); schedulePosture();
  practiceTimer=setInterval(()=>{
    practiceSeconds++;
    // Update only the timer element — no full re-render each second
    const te=document.getElementById('pt');
    if(te) te.textContent=fmtTime(practiceSeconds);
    if(practiceSeconds%300===0){ S.totalMinutes+=5; addXp(5); }
  },1000);
  refreshPractice();
}
function stopPractice(){
  if(!isPracticing&&!practiceTimer) return;
  isPracticing=false; clearInterval(practiceTimer); practiceTimer=null;
  clearTimeout(postureTimeout); showPosture=false;
  if(metroOn) stopMetro();
  save(); refreshPractice();
}
function togglePractice(){ isPracticing?stopPractice():startPractice(); }

function schedulePosture(){
  clearTimeout(postureTimeout);
  if(!isPracticing) return;
  postureTimeout=setTimeout(()=>{
    if(!isPracticing) return;
    showPosture=true; playChime(); refreshPractice();
    setTimeout(()=>{
      showPosture=false; combo++; addXp(combo*3);
      schedulePosture(); refreshPractice();
    },3500);
  }, S.settings.checkInterval*1000);
}

function changeBpm(delta, abs){
  if(abs!==undefined) S.settings.bpm=abs;
  else S.settings.bpm=Math.max(40,Math.min(220,S.settings.bpm+delta));
  save(); restartMetro(); refreshPractice();
}

function fmtTime(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

// Sheet
let sheetData=null, sheetName='';
function loadSheet(e){
  const f=e.target.files[0]; if(!f) return;
  if(sheetData) URL.revokeObjectURL(sheetData.url);
  sheetData={url:URL.createObjectURL(f),type:f.type}; sheetName=f.name;
  refreshPractice();
}
function clearSheet(){
  if(sheetData) URL.revokeObjectURL(sheetData.url);
  sheetData=null; sheetName=''; refreshPractice();
}

// Camera
let camOn=false, camStream=null;
function toggleCamera(){
  if(camOn){
    camOn=false;
    if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
    refreshPractice();
  } else {
    navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}})
      .then(s=>{ camOn=true; camStream=s; refreshPractice();
        setTimeout(()=>{ const v=document.getElementById('cam-video'); if(v) v.srcObject=s; },60); })
      .catch(()=>alert('无法访问摄像头，请检查浏览器权限。'));
  }
}
function afterPracticeRender(){
  if(camOn&&camStream){ const v=document.getElementById('cam-video'); if(v) v.srcObject=camStream; }
}

// Hatch
function doHatch(){
  if(!eggMax()) return;
  const pet=drawPet(S.streak);
  S.eggXp=0; combo=0; S.collectedPets.push({id:pet.id,ts:Date.now()}); save();
  showHatchModal(pet);
}
function showHatchModal(pet){

//  GAME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let gameState='idle', gameSong=0;
let gameScore=0, gameCombo=0, gameMaxCombo=0;
let gameLiveNotes=[], gameNoteId=0, noteTimer=null, seqIdx=0;
let _gameKey=null;

function startGame(){
  gameState='playing'; gameScore=0; gameCombo=0; gameMaxCombo=0;
  gameLiveNotes=[]; gameNoteId=0; seqIdx=0;
  render(); bindGameKeys(); spawnLoop();
}
function endGame(){
  clearInterval(noteTimer); noteTimer=null; removeGameKeys();
  const xp=Math.floor(gameScore/10); if(xp>0) addXp(xp);
  if(gameScore>S.gameHighScore){ S.gameHighScore=gameScore; save(); }
  gameState='result'; render();
}
function selectSong(i){ gameSong=i; render(); }

function spawnLoop(){
  const song=SONGS[gameSong], iv=song.seq?620:880;
  noteTimer=setInterval(()=>{
    if(gameState!=='playing'){ clearInterval(noteTimer); return; }
    const lane=song.seq?song.seq[seqIdx++%song.seq.length]:Math.floor(Math.random()*7);
    spawnNote(lane); sweepMissed();
  },iv);
}
function spawnNote(lane){
  const fz=document.getElementById('fall-zone'); if(!fz) return;
  const h=fz.clientHeight, id=gameNoteId++;
  const dur=Math.max(1.3,2.4-gameCombo*.025);
  const lw=100/7;
  const el=document.createElement('div');
  el.id='gn-'+id; el.className='note-block';
  el.style.cssText=`left:${(lane*lw+lw*.08).toFixed(2)}%;width:${(lw*.84).toFixed(2)}%;height:46px;top:0;--fd:${h+70}px;--fd-dur:${dur}s;background:${NOTE_COLORS[lane]};color:#fff;box-shadow:0 4px 14px ${NOTE_COLORS[lane]}77;`;
  el.textContent=NOTE_NAMES[lane];
  fz.appendChild(el);
  gameLiveNotes.push({id,lane,el,hit:false});
}
function sweepMissed(){
  const fz=document.getElementById('fall-zone'); if(!fz) return;
  const bottom=fz.getBoundingClientRect().bottom;
  gameLiveNotes=gameLiveNotes.filter(n=>{
    if(n.hit) return false;
    const r=n.el.getBoundingClientRect();
    if(r.top>bottom+12){
      n.el.remove(); gameCombo=0;
      showJudgment('MISS','#6b7280',bottom-100); updateGameHUD(); return false;
    }
    return true;
  });
}
function hitLane(lane){
  playNoteSound(lane); flashKey(lane);
  const fz=document.getElementById('fall-zone'); if(!fz) return;
  const fzR=fz.getBoundingClientRect();
  const hitTop=fzR.bottom-130, hitBot=fzR.bottom+15;
  let best=null, bestDist=Infinity;
  for(const n of gameLiveNotes){
    if(n.lane!==lane||n.hit) continue;
    const r=n.el.getBoundingClientRect(), mid=r.top+r.height/2;
    if(mid>hitTop&&mid<hitBot){
      const d=Math.abs(mid-(fzR.bottom-70)); if(d<bestDist){bestDist=d;best=n;}
    }
  }
  if(best){
    best.hit=true;
    best.el.style.animation='notehit .22s ease forwards';
    setTimeout(()=>best.el.remove(),220);
    gameCombo++; if(gameCombo>gameMaxCombo) gameMaxCombo=gameCombo;
    gameScore+=100*Math.min(gameCombo,8);
    showJudgment(bestDist<22?'PERFECT!':'GREAT', bestDist<22?'#fbbf24':'#34d399', fzR.bottom-120);
    updateGameHUD();
  }
}
function flashKey(lane){
  const k=document.getElementById('hk-'+lane); if(!k) return;
  k.classList.add('pressed'); setTimeout(()=>k.classList.remove('pressed'),140);
}
function updateGameHUD(){
  const sd=document.getElementById('gscore'); if(sd) sd.textContent=gameScore;
  const cd=document.getElementById('gcombo'); if(cd) cd.textContent=gameCombo>1?gameCombo+'×':'';
}
function showJudgment(text,color,top){
  const el=document.createElement('div'); el.className='judgment-popup';
  el.style.color=color; el.style.fontSize=(text==='PERFECT!'?'24px':'18px'); el.style.top=(top||200)+'px';
  el.textContent=text; document.body.appendChild(el); setTimeout(()=>el.remove(),850);
}
function bindGameKeys(){
  _gameKey=e=>{ const i=KEY_LABELS.indexOf(e.key.toUpperCase()); if(i>=0) hitLane(i); };
  window.addEventListener('keydown',_gameKey);
}
function removeGameKeys(){ if(_gameKey){ window.removeEventListener('keydown',_gameKey); _gameKey=null; } }

function render(){
  const vc=document.getElementById('view-content');

  const map={home:buildHome, practice:buildPractice, dex:buildDex, stats:buildStats,
    game:()=>gameState==='playing'?buildGamePlaying():gameState==='result'?buildGameResult():buildGameIdle()};

  afterRender();

function afterRender(){
  if(currentView==='practice') afterPracticeRender();

    if(gameState==='playing') bindGameKeys();
    // "返回选歌" button — safe event binding, not inline onclick for gameState mutation
    const backBtn=document.getElementById('back-to-idle');
    if(backBtn) backBtn.addEventListener('click',()=>{ gameState='idle'; render(); });
    // reset button in stats
    const resetBtn=document.getElementById('reset-btn');
    if(resetBtn) resetBtn.addEventListener('click',()=>{ if(confirm('确定要清空所有数据？')) resetAll(); });
  }
  if(currentView==='stats'){
    const resetBtn=document.getElementById('reset-btn');
    if(resetBtn) resetBtn.addEventListener('click',()=>{ if(confirm('确定要清空所有数据？')) resetAll(); });
  }
}

function resetAll(){

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AI 识谱 (Gemini Vision — 通过 /api/analyze 代理)
//  Key 存在 Vercel 环境变量中，前端不持有任何密钥
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let analyzerState = 'idle'; // idle | capturing | analyzing | done | error
let analyzerResult = '';
let analyzerStream = null;

function openAnalyzer(){
  analyzerState = 'capturing';
  analyzerResult = '';
  refreshPractice();
  setTimeout(()=>{
    const v = document.getElementById('analyzer-video');
    if(!v) return;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
      .then(s => { analyzerStream = s; v.srcObject = s; })
      .catch(()=>{ analyzerState='error'; analyzerResult='无法访问摄像头，请检查权限。'; refreshPractice(); });
  }, 80);
}

function closeAnalyzer(){
  if(analyzerStream){ analyzerStream.getTracks().forEach(t=>t.stop()); analyzerStream=null; }
  analyzerState = 'idle'; analyzerResult = '';
  refreshPractice();
}

async function captureAndAnalyze(){
  const v = document.getElementById('analyzer-video');
  const c = document.getElementById('analyzer-canvas');
  if(!v || !c) return;
  c.width = v.videoWidth || 640; c.height = v.videoHeight || 480;
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  const b64 = c.toDataURL('image/jpeg', 0.85).split(',')[1];

  if(analyzerStream){ analyzerStream.getTracks().forEach(t=>t.stop()); analyzerStream=null; }
  analyzerState = 'analyzing'; refreshPractice();

  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents:[{ parts:[
        { text:`你是一个耐心温柔的儿童钢琴老师。请分析这张钢琴乐谱的照片，用10岁孩子能懂的语言，分点说明：
1. 调号和拍号是什么，用通俗的话解释
2. 这首曲子的情绪和弹奏感觉
3. 有哪2-3个需要特别注意的难点（比如跨手、连线、快速音群）
4. 给孩子一句鼓励的话

如果照片里没有清晰的五线谱，请温和地说明并请孩子重新拍摄。回答请简洁，不超过150字。` },
        { inlineData:{ mimeType:'image/jpeg', data:b64 } }
      ]}]}),
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
    analyzerResult = data.candidates?.[0]?.content?.parts?.[0]?.text || '分析失败，请重试。';
    analyzerState = 'done';
  } catch(e) {
    analyzerResult = `出错了：${e.message}`;
    analyzerState = 'error';
  }
  refreshPractice();
}

  if(analyzerState === 'idle') return '';

      ${isDone ? `
        <div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:16px;padding:18px;">
          <div style="font-size:11px;font-weight:700;color:#34d399;margin-bottom:10px;">📋 分析结果</div>

        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn" onclick="openAnalyzer();" style="flex:1;padding:13px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:#34d399;font-size:13px;border-radius:12px;">🔄 重新拍摄</button>
          <button class="btn" onclick="closeAnalyzer();" style="flex:1;padding:13px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:#a78bfa;font-size:13px;border-radius:12px;">✓ 开始练琴</button>
        </div>` : ''}
    </div>
  </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  GLOBAL BINDINGS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Object.assign(window,{
  navigate, doSetup, togglePractice, changeBpm, toggleMetro,
  toggleCamera, loadSheet, clearSheet, doHatch,
  selectSong, startGame, endGame, hitLane,
  openAnalyzer, closeAnalyzer, captureAndAnalyze,
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

render();
