<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎹 练琴星球</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: #FFFBEB;
  color: #854D0E;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

#app { position: relative; z-index: 1; min-height: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; }
#view-content { flex: 1; overflow-y: auto; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }

@media (min-width: 768px) { #app { max-width: 540px; } }
.tab-bar-spacer { height: calc(80px + env(safe-area-inset-bottom, 0px)); flex-shrink: 0; }

.starfield {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 20% 50%, #FEF3C7 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, #FEE2E2 0%, transparent 50%), #FFFBEB;
}
.starfield::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(30px 30px at 15% 25%, rgba(236,72,153,.05) 0%, transparent 100%),
    radial-gradient(40px 40px at 80% 10%, rgba(234,179,8,.05) 0%, transparent 100%),
    radial-gradient(25px 25px at 50% 70%, rgba(236,72,153,.04) 0%, transparent 100%),
    radial-gradient(50px 50px at 10% 80%, rgba(234,179,8,.06) 0%, transparent 100%),
    radial-gradient(35px 35px at 90% 60%, rgba(236,72,153,.05) 0%, transparent 100%);
  filter: blur(8px);
}

.glass {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(234, 179, 8, 0.2);
  border-radius: 20px;
  box-shadow: 0 4px 15px rgba(236, 72, 153, 0.05);
}
.glass-dark {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(236, 72, 153, 0.25);
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(236, 72, 153, 0.08);
}

.fredoka { font-family: 'Fredoka One', cursive; }

@keyframes float     { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
@keyframes wiggle    { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
@keyframes shake     { 0%,100%{transform:translate(0,0) rotate(0)} 25%{transform:translate(-3px,0) rotate(-3deg)} 75%{transform:translate(3px,0) rotate(3deg)} }
@keyframes popin     { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.1) rotate(4deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes shimmer   { 0%{background-position:-200% center} 100%{background-position:200% center} }
@keyframes glowpulse { 0%,100%{box-shadow:0 0 20px rgba(234,179,8,.15)} 50%{box-shadow:0 0 42px rgba(236,72,153,.25)} }
@keyframes combofly  { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-55px);opacity:0} }
@keyframes notefall  { from{transform:translateY(-70px);opacity:0} 6%{opacity:1} to{transform:translateY(var(--fd));opacity:1} }
@keyframes notehit   { 0%{transform:scale(1);opacity:1} 60%{transform:scale(1.4);opacity:.6} 100%{transform:scale(.2);opacity:0} }

.anim-float    { animation: float 3s ease-in-out infinite; }
.anim-wiggle   { animation: wiggle .5s ease-in-out infinite; }
.anim-shake    { animation: shake .3s ease-in-out infinite; }
.anim-popin    { animation: popin .5s cubic-bezier(.175,.885,.32,1.275) forwards; }
.anim-glowpulse{ animation: glowpulse 2.2s ease-in-out infinite; }

/* ── 蛋互动动画 ── */
@keyframes egg-wiggle-left  { 0%{transform:rotate(0)} 25%{transform:rotate(-18deg) scale(1.08)} 50%{transform:rotate(12deg) scale(.96)} 75%{transform:rotate(-8deg)} 100%{transform:rotate(0)} }
@keyframes egg-wiggle-right { 0%{transform:rotate(0)} 25%{transform:rotate(18deg) scale(1.08)} 50%{transform:rotate(-12deg) scale(.96)} 75%{transform:rotate(8deg)} 100%{transform:rotate(0)} }
@keyframes egg-bounce       { 0%{transform:translateY(0) scale(1)} 30%{transform:translateY(-22px) scale(1.06,.94)} 55%{transform:translateY(0) scale(.94,1.06)} 75%{transform:translateY(-10px) scale(1.03,.97)} 100%{transform:translateY(0) scale(1)} }
@keyframes egg-shy          { 0%{transform:translateX(0) rotate(0)} 20%{transform:translateX(28px) rotate(10deg)} 50%{transform:translateX(20px) rotate(-6deg)} 80%{transform:translateX(28px) rotate(8deg)} 100%{transform:translateX(0) rotate(0)} }
@keyframes egg-run-left     { 0%{transform:translateX(0) rotate(0)} 15%{transform:translateX(-38px) rotate(-20deg)} 40%{transform:translateX(-26px) rotate(12deg)} 65%{transform:translateX(-42px) rotate(-15deg)} 100%{transform:translateX(0) rotate(0)} }
@keyframes egg-run-right    { 0%{transform:translateX(0) rotate(0)} 15%{transform:translateX(38px) rotate(20deg)} 40%{transform:translateX(26px) rotate(-12deg)} 65%{transform:translateX(42px) rotate(15deg)} 100%{transform:translateX(0) rotate(0)} }
@keyframes egg-spin         { 0%{transform:rotate(0) scale(1)} 40%{transform:rotate(340deg) scale(1.12)} 70%{transform:rotate(380deg) scale(.9)} 100%{transform:rotate(360deg) scale(1)} }

.egg-wiggle-left  { animation: egg-wiggle-left  var(--egg-dur,.5s) ease forwards !important; }
.egg-wiggle-right { animation: egg-wiggle-right var(--egg-dur,.5s) ease forwards !important; }
.egg-bounce       { animation: egg-bounce       var(--egg-dur,.6s) cubic-bezier(.36,.07,.19,.97) forwards !important; }
.egg-shy          { animation: egg-shy          var(--egg-dur,.8s) ease-in-out forwards !important; }
.egg-run-left     { animation: egg-run-left     var(--egg-dur,.7s) ease-in-out forwards !important; }
.egg-run-right    { animation: egg-run-right    var(--egg-dur,.7s) ease-in-out forwards !important; }
.egg-spin         { animation: egg-spin         var(--egg-dur,.6s) ease-in-out forwards !important; }
.egg-interact-wrapper { display: inline-block; transform-origin: bottom center; }

/* 独立的地板阴影 */
.egg-shadow {
  position: absolute; bottom: -12%; left: 50%; transform: translateX(-50%); width: 75%; height: 25%;
  background: radial-gradient(ellipse at center, rgba(133,77,14,0.15) 0%, rgba(133,77,14,0) 70%);
  border-radius: 50%; pointer-events: none; z-index: 1;
}
@keyframes shadow-pulse { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; } 50% { transform: translateX(-50%) scale(0.8); opacity: 0.4; } }
.anim-shadow-pulse { animation: shadow-pulse 3s ease-in-out infinite; }

/* 纯 CSS 硬件加速 3D 蛋 */
.pet-egg {
  width: var(--egg-size, 88px); height: calc(var(--egg-size, 88px) * 1.25);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: relative;
  box-shadow: inset -10px -15px 20px rgba(0,0,0,0.1), inset 8px 8px 15px rgba(255,255,255,0.6), 0 15px 25px var(--egg-shadow, rgba(236,72,153,0.15));
  overflow: hidden; transform: translateZ(0);
}
.pet-egg::after {
  content: ''; position: absolute; top: 6%; left: 15%; width: 40%; height: 45%; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
  transform: rotate(-25deg); pointer-events: none;
}
@keyframes crackglow { 0%,100%{transform:scale(1) rotate(-1deg);filter:brightness(1)} 50%{transform:scale(1.05) rotate(1deg);filter:brightness(1.15)} }
.anim-crack { animation: crackglow 1.5s ease-in-out infinite; }

.progress-fill {
  background: linear-gradient(90deg, #EAB308, #EC4899, #EAB308);
  background-size: 200% auto;
  animation: shimmer 2s linear infinite;
  height: 100%; border-radius: 99px;
  transition: width .5s ease;
}

.tab-bar  { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0px); }
@media (min-width: 768px) { .tab-bar { max-width: 540px; } }
.tab-inner{ margin: 6px 10px; background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border: 1px solid rgba(234,179,8,0.15); border-radius: 20px; padding: 6px 4px; display: flex; gap: 2px; box-shadow: 0 8px 24px rgba(234,179,8,0.08); }
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 2px; cursor:pointer; border-radius:14px; transition:background .2s; user-select:none; }
.tab-item.active { background: rgba(236,72,153,0.1); }
.tab-icon { font-size:20px; transition:transform .2s; }
.tab-item.active .tab-icon { transform:scale(1.15); }
.tab-label{ font-size:9px; font-weight:700; color:#A8A29E; transition:color .2s; }
.tab-item.active .tab-label { color:#DB2777; }

.btn { border:none; cursor:pointer; font-family:inherit; font-weight:700; border-radius:14px; transition:transform .14s, opacity .14s; display:inline-flex; align-items:center; justify-content:center; }
.btn:active { transform:scale(.95); }

.hit-key { border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; user-select:none; border:2px solid; transition:all .1s; font-family:inherit; font-weight:800; padding:6px 2px; background:none; }
.hit-key.pressed { filter:brightness(1.1); transform:scale(.92); box-shadow:0 0 14px currentColor; }

.note-block { position:absolute; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; pointer-events:none; animation:notefall var(--fd-dur,2s) linear forwards; }
.judgment-popup { position:fixed; left:50%; transform:translateX(-50%); font-weight:900; pointer-events:none; animation:combofly .85s ease forwards; white-space:nowrap; text-shadow:0 1px 4px rgba(0,0,0,.15); z-index:80; }
.cal-day  { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.cal-done { background:rgba(234,179,8,.15); color:#CA8A04; border:1px solid rgba(234,179,8,.3); }
.cal-today{ outline:2px solid #EC4899; }
.cal-empty{ background:rgba(0,0,0,.03); color:#D6D3D1; }

.modal-overlay { position:fixed; inset:0; background:rgba(255,251,235,.8); backdrop-filter:blur(8px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }

.rarity-common { background:#FEF3C7; color:#A16207; border:1px solid #FDE68A; }
.rarity-rare   { background:#FCE7F3; color:#BE185D; border:1px solid #FBCFE8; }
.rarity-epic   { background:linear-gradient(135deg,#EAB308,#EC4899); color:#fff; }
.rarity-legend { background:linear-gradient(135deg,#EC4899,#8B5CF6); color:#fff; }

input[type=range]{ accent-color:#EC4899; cursor:pointer; }
::-webkit-scrollbar{ width:5px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:rgba(236,72,153,.3); border-radius:99px; }
</style>
</head>
<body>
<div class="starfield"></div>
<div id="app">
  <div id="view-content"></div>
  <div class="tab-bar" id="tab-bar"></div>
</div>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CONSTANTS & DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const XP_LEVELS  = [0, 150, 400, 800, 1500];
const EGG_STAGES = ['沉睡中','轻微颤动','出现裂缝','破壳前夕','✨ 满级'];
const EGG_ANIMS  = ['anim-float','anim-wiggle','anim-wiggle','anim-shake','anim-crack'];

const NOTE_NAMES  = ['Do','Re','Mi','Fa','Sol','La','Si'];
const NOTE_COLORS = ['#EF4444','#F97316','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EC4899'];
const NOTE_FREQS  = [261.63,293.66,329.63,349.23,392.00,440.00,493.88];
const KEY_LABELS  = ['A','S','D','F','G','H','J'];

const TIPS = [
  '慢速练习是进步最快的方式，先把每个音弹准确再提速。',
  '新曲子先单手练，左右手都熟了再合并。',
  '练习前先听一遍整首曲子，建立对音乐的整体感受。',
  '遇到困难的地方，单独截出来反复练习，攻克它！',
  '保持手腕放松，不要紧绷——想象手心里握着一个苹果。',
  '每次练完，试试从头到尾完整弹一遍，培养演奏感。',
  '节拍器是你最好的朋友，哪怕很慢也要跟着拍子弹。',
];

const SONGS = [
  { name:'自由模式（随机无限）', seq: null },
  { name:'小星星', seq:[0,0,4,4,5,5,4,3,3,2,2,1,1,0,4,4,3,3,2,2,1,4,4,3,3,2,2,1,0,0,4,4,5,5,4,3,3,2,2,1,1,0] },
  { name:'玛丽有只小羊羔', seq:[2,1,0,1,2,2,2,1,1,1,2,4,4,2,1,0,1,2,2,2,2,1,1,2,1,0] },
  { name:'生日快乐', seq:[0,0,1,0,3,2,0,0,1,0,4,3,0,0,0,5,3,2,1,6,6,5,3,4,3] },
];

const PETS_R = {
  common: [
    {id:'c1',emoji:'🐱',name:'音符小猫',  color:'#EAB308',power:80},
    {id:'c2',emoji:'🐰',name:'节拍兔',    color:'#EC4899',power:90},
    {id:'c3',emoji:'🐸',name:'哼歌青蛙',  color:'#EAB308',power:85},
    {id:'c4',emoji:'🐹',name:'练习仓鼠',  color:'#EC4899',power:75},
    {id:'c5',emoji:'🦔',name:'刺猬琴手',  color:'#EAB308',power:88},
  ],
  rare: [
    {id:'r1',emoji:'🦊',name:'魔法赤狐',    color:'#EC4899',power:220},
    {id:'r2',emoji:'🦋',name:'旋律蝴蝶',    color:'#EAB308',power:240},
    {id:'r3',emoji:'🐬',name:'海豚音姬',    color:'#DB2777',power:210},
    {id:'r4',emoji:'🦉',name:'夜曲猫头鹰',  color:'#EAB308',power:250},
  ],
  epic: [
    {id:'e1',emoji:'🐉',name:'韵律龙王',   color:'#EAB308',power:600},
    {id:'e2',emoji:'🦄',name:'星光独角兽', color:'#DB2777',power:650},
    {id:'e3',emoji:'🔥',name:'烈焰凤凰',   color:'#E11D48',power:700},
  ],
  legend: [
    {id:'l1',emoji:'✨',name:'宇宙乐神', color:'#EC4899',power:1500},
  ],
};
const ALL_PETS = [...PETS_R.common,...PETS_R.rare,...PETS_R.epic,...PETS_R.legend];

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function petById(id){ return ALL_PETS.find(p=>p.id===id); }
function drawPet(streak){
  const r = Math.random() + streak*0.01;
  if(r>1.08) return PETS_R.legend[0];
  if(r>0.85) return rnd(PETS_R.epic);
  if(r>0.55) return rnd(PETS_R.rare);
  return rnd(PETS_R.common);
}
function hexRgb(hex){ return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16); }
function esc(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MULTI-PROFILE STATE MANAGEMENT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let AppStore = { profiles: [], activeId: null };
let S = null;

function createProfileData(name) {
  return {
    id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
    name: name, eggXp: 0, totalMinutes: 0, streak: 0, lastPracticeDate: '',
    collectedPets: [], checkinDays: [], gameHighScore: 0,
    settings: { bpm: 90, checkInterval: 300 }
  };
}

function loadStore() {
  try {
    const r = localStorage.getItem('piano_pet_v4_multi');
    if(r) AppStore = JSON.parse(r);
  } catch(_) {}
  
  if(AppStore.profiles.length === 0) {
    try {
      const oldS = JSON.parse(localStorage.getItem('piano_pet_v3'));
      if(oldS && oldS.name) {
        const p = createProfileData(oldS.name);
        Object.assign(p, oldS);
        p.id = 'legacy';
        AppStore.profiles.push(p);
        AppStore.activeId = p.id;
      }
    } catch(_) {}
  }
  if(AppStore.activeId) { S = AppStore.profiles.find(p => p.id === AppStore.activeId); }
}
loadStore();

function save(){ try{ localStorage.setItem('piano_pet_v4_multi',JSON.stringify(AppStore)); }catch(_){} }

function eggLevel(){
  if(!S) return 0;
  let lv=0;
  for(let i=0;i<XP_LEVELS.length;i++) if(S.eggXp>=XP_LEVELS[i]) lv=i;
  return lv;
}
function eggMax(){ return eggLevel()>=XP_LEVELS.length-1; }
function xpPct(){
  if(!S) return 0;
  const lv=eggLevel();
  if(eggMax()) return 100;
  return Math.min(100,((S.eggXp-XP_LEVELS[lv])/(XP_LEVELS[lv+1]-XP_LEVELS[lv]))*100);
}
function addXp(n){ if(S) { S.eggXp+=n; save(); } }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function recordDay(){
  if(!S) return;
  const today=todayStr();
  if(S.lastPracticeDate===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yStr=y.toISOString().slice(0,10);
  S.streak = S.lastPracticeDate===yStr ? S.streak+1 : 1;
  S.lastPracticeDate=today;
  if(!S.checkinDays.includes(today)) S.checkinDays.push(today);
  save();
}
function getProfilePower(profile) {
  if (!profile.collectedPets) return 0;
  return profile.collectedPets.reduce((tot, col) => {
    const p = window.petById(col.id);
    return tot + (p ? p.power * (col.count || 1) : 0);
  }, 0);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  EGG RENDERING & INTERACTION (3D)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildEgg(lv, size, animClass = '') {
  const colors = [
    ['#E0F2FE', '#38BDF8', '#0284C7', 'rgba(2,132,199,0.3)'],   // 0: 清透天蓝
    ['#FEF08A', '#EAB308', '#A16207', 'rgba(161,98,7,0.3)'],    // 1: 柠檬黄
    ['#FFEDD5', '#FB923C', '#C2410C', 'rgba(194,65,12,0.3)'],   // 2: 活力橙
    ['#FBCFE8', '#EC4899', '#9D174D', 'rgba(157,23,77,0.3)'],   // 3: 玫粉色
    ['#FDE047', '#F59E0B', '#BE185D', 'rgba(236,72,153,0.4)']   // 4: 金粉交织
  ];
  const c = colors[Math.min(lv, 4)];
  const bg = `radial-gradient(circle at 35% 30%, ${c[0]} 0%, ${c[1]} 45%, ${c[2]} 100%)`;
  
  let cracks = '';
  if(lv >= 2) cracks += `<path d="M45,25 L40,45 L52,60" fill="none" stroke="rgba(133,77,14,0.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M45,26 L40,46 L52,61" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>`;
  if(lv >= 3) cracks += `<path d="M52,60 L65,75 L55,95" fill="none" stroke="rgba(133,77,14,0.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M52,61 L65,76 L55,96" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><path d="M40,45 L25,55 L28,70" fill="none" stroke="rgba(133,77,14,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  if(lv >= 4) cracks += `<path d="M45,25 L65,10" fill="none" stroke="#EAB308" stroke-width="6" stroke-linecap="round" opacity="0.6"/><path d="M45,25 L65,10" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M55,95 L45,110" fill="none" stroke="#EAB308" stroke-width="6" stroke-linecap="round" opacity="0.6"/><path d="M55,95 L45,110" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>`;

  const shadowAnim = animClass === 'anim-float' ? 'anim-shadow-pulse' : '';

  return `<div style="display:inline-block; position:relative; cursor:pointer;" onmouseenter="window.eggInteract(this)" ontouchstart="window.eggInteract(this)">
    <div class="${animClass}" style="position:relative; z-index:2;">
      <div class="egg-interact-wrapper">

        </div>
      </div>
    </div>
    <div class="egg-shadow ${shadowAnim}"></div>

}

const EGG_REACTIONS = [
  ['egg-wiggle-left',  500], ['egg-wiggle-right', 500], ['egg-bounce',       600],
  ['egg-shy',          800], ['egg-run-left',     700], ['egg-run-right',    700], ['egg-spin',         600],
];
let eggReactCooldown = false;
function eggInteract(container) {
  if (eggReactCooldown) return;
  const wrapper = container.querySelector('.egg-interact-wrapper');
  if (!wrapper || wrapper.dataset.playing === "true") return;
  
  eggReactCooldown = true;
  wrapper.dataset.playing = "true";
  const roll = Math.random();
  let reaction;
  if (roll < 0.18) reaction = EGG_REACTIONS[4]; 
  else if (roll < 0.36) reaction = EGG_REACTIONS[5]; 
  else if (roll < 0.52) reaction = EGG_REACTIONS[3]; 
  else if (roll < 0.68) reaction = EGG_REACTIONS[2]; 
  else if (roll < 0.84) reaction = EGG_REACTIONS[0]; 
  else reaction = EGG_REACTIONS[6]; 

  wrapper.style.animation = 'none';
  void wrapper.offsetWidth;
  wrapper.style.animation = `${reaction[0]} ${reaction[1]/1000}s ease-out forwards`;

  setTimeout(() => {
    wrapper.dataset.playing = "false";
    wrapper.style.animation = '';
    eggReactCooldown = false;
  }, reaction[1]);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUDIO & METRONOME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let audioCtx=null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
let metroOn=false, metroIv=null, metroNext=0, metroBeat=0;
function metroClick(t,accent){
  const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value=accent?1200:800; o.type='sine';
  g.gain.setValueAtTime(accent?.45:.28,t); g.gain.exponentialRampToValueAtTime(.001,t+.08);
  o.start(t); o.stop(t+.08);
}
function metroTick(){
  const ctx=getCtx();
  while(metroNext<ctx.currentTime+.1){ metroClick(metroNext,metroBeat%4===0); metroNext+=60/(S?.settings.bpm||120); metroBeat++; }
}
function startMetro(){
  const ctx=getCtx(); metroNext=ctx.currentTime+.05; metroBeat=0;
  metroOn=true; metroIv=setInterval(metroTick,25);
}
function stopMetro(){ clearInterval(metroIv); metroOn=false; metroBeat=0; }
function toggleMetro(){ metroOn?window.stopMetro():window.startMetro(); window.refreshPractice(); }
function restartMetro(){
  if(!metroOn) return;
  clearInterval(metroIv); const ctx=getCtx(); metroNext=ctx.currentTime+.05; metroBeat=0; metroIv=setInterval(metroTick,25);
}
function playChime(){
  try{
    const ctx=getCtx();
    [880,1100,1320].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=f; o.type='sine';
      const t=ctx.currentTime+i*.12; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.3,t+.05); g.gain.exponentialRampToValueAtTime(.001,t+.7); o.start(t); o.stop(t+.7);
    });
  }catch(_){}
}
function playNoteSound(i){
  try{
    const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=NOTE_FREQS[i]; o.type='triangle';
    g.gain.setValueAtTime(.35,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45); o.start(ctx.currentTime); o.stop(ctx.currentTime+.45);
  }catch(_){}
}

//  GAME LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let gameState='idle', gameSong=0;
let gameScore=0, gameCombo=0, gameMaxCombo=0;
let gameLiveNotes=[], gameNoteId=0, noteTimer=null, seqIdx=0;
let _gameKey=null;

function startGame(){
  gameState='playing'; gameScore=0; gameCombo=0; gameMaxCombo=0;
  gameLiveNotes=[]; gameNoteId=0; seqIdx=0;
  window.render(); window.bindGameKeys(); window.spawnLoop();
}
function endGame(){
  clearInterval(noteTimer); noteTimer=null; window.removeGameKeys();
  const xp=Math.floor(gameScore/10); if(xp>0) window.addXp(xp);
  if(gameScore>S.gameHighScore){ S.gameHighScore=gameScore; window.save(); }
  gameState='result'; window.render();
}
function selectSong(i){ gameSong=i; window.render(); }

function spawnLoop(){
  const song=SONGS[gameSong], iv=song.seq?620:880;
  noteTimer=setInterval(()=>{
    if(gameState!=='playing'){ clearInterval(noteTimer); return; }
    const lane=song.seq?song.seq[seqIdx++%song.seq.length]:Math.floor(Math.random()*7);
    window.spawnNote(lane); window.sweepMissed();
  },iv);
}
function spawnNote(lane){
  const fz=document.getElementById('fall-zone'); if(!fz) return;
  const h=fz.clientHeight, id=gameNoteId++;
  const dur=Math.max(1.3,2.4-gameCombo*.025);
  const lw=100/7;
  const el=document.createElement('div');
  el.id='gn-'+id; el.className='note-block';
  el.style.cssText=`left:${(lane*lw+lw*.08).toFixed(2)}%;width:${(lw*.84).toFixed(2)}%;height:46px;top:0;--fd:${h+70}px;--fd-dur:${dur}s;background:${NOTE_COLORS[lane]};color:#1c1917;box-shadow:0 4px 14px ${NOTE_COLORS[lane]}77;`;
  el.textContent=NOTE_NAMES[lane];
  fz.appendChild(el);
  gameLiveNotes.push({id,lane,el,hit:false});
}
function sweepMissed(){
  const fz=document.getElementById('fall-zone'); if(!fz) return;
  const bottom=fz.getBoundingClientRect().bottom;
  gameLiveNotes=gameLiveNotes.filter(n=>{
    if(n.hit) return false;
    const r=n.el.getBoundingClientRect();
    if(r.top>bottom+12){
      n.el.remove(); gameCombo=0;
      window.showJudgment('MISS','#A8A29E',bottom-100); window.updateGameHUD(); return false;
    }
    return true;
  });
}
function hitLane(lane){
  window.playNoteSound(lane); window.flashKey(lane);
  const fz=document.getElementById('fall-zone'); if(!fz) return;
  const fzR=fz.getBoundingClientRect();
  const hitTop=fzR.bottom-130, hitBot=fzR.bottom+15;
  let best=null, bestDist=Infinity;
  for(const n of gameLiveNotes){
    if(n.lane!==lane||n.hit) continue;
    const r=n.el.getBoundingClientRect(), mid=r.top+r.height/2;
    if(mid>hitTop&&mid<hitBot){
      const d=Math.abs(mid-(fzR.bottom-70)); if(d<bestDist){bestDist=d;best=n;}
    }
  }
  if(best){
    best.hit=true;
    best.el.style.animation='notehit .22s ease forwards';
    setTimeout(()=>best.el.remove(),220);
    gameCombo++; if(gameCombo>gameMaxCombo) gameMaxCombo=gameCombo;
    gameScore+=100*Math.min(gameCombo,8);
    window.showJudgment(bestDist<22?'PERFECT!':'GREAT', bestDist<22?'#EC4899':'#EAB308', fzR.bottom-120);
    window.updateGameHUD();
  }
}
function flashKey(lane){
  const k=document.getElementById('hk-'+lane); if(!k) return;
  k.classList.add('pressed'); setTimeout(()=>k.classList.remove('pressed'),140);
}
function updateGameHUD(){
  const sd=document.getElementById('gscore'); if(sd) sd.textContent=gameScore;
  const cd=document.getElementById('gcombo'); if(cd) cd.textContent=gameCombo>1?gameCombo+'×':'';
}
function showJudgment(text,color,top){
  const el=document.createElement('div'); el.className='judgment-popup';
  el.style.color=color; el.style.fontSize=(text==='PERFECT!'?'24px':'18px'); el.style.top=(top||200)+'px';
  el.textContent=text; document.body.appendChild(el); setTimeout(()=>el.remove(),850);
}
function bindGameKeys(){
  _gameKey=e=>{ const i=KEY_LABELS.indexOf(e.key.toUpperCase()); if(i>=0) window.hitLane(i); };
  window.addEventListener('keydown',_gameKey);
}
function removeGameKeys(){ if(_gameKey){ window.removeEventListener('keydown',_gameKey); _gameKey=null; } }

function toggleCamera(){
  if(camOn){ 
    camOn=false; 
    if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } 
    window.refreshPractice(); 
  } else { 
    window.startPracticeCamera();
  }
}
function startPracticeCamera() {
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert('无法调用摄像头。请确保在 HTTPS (安全链接) 环境下打开，或者检查浏览器权限。');
    return;
  }

  navigator.mediaDevices.getUserMedia({video:{facingMode: { ideal: practiceFacingMode }}})
    .then(s=>{ 
      camOn=true; camStream=s; window.refreshPractice(); 
      setTimeout(()=>{ 
        const v=document.getElementById('cam-video'); 
        if(v) { 
          v.srcObject=s; 
          // 只有前置镜头才做镜像翻转，后置镜头保持真实方向
          v.style.transform = practiceFacingMode==='user'?'scaleX(-1)':'none'; 
        } 
      },60); 
    }).catch((err)=>{
      alert('无法访问摄像头: ' + err.message + '。请在手机设置中允许浏览器使用摄像头权限。');
    });
}
function switchPracticeCamera() {
  practiceFacingMode = practiceFacingMode === 'user' ? 'environment' : 'user';
  if(camOn) window.startPracticeCamera();
}
function afterPracticeRender(){ 
  if(camOn&&camStream){ 
    const v=document.getElementById('cam-video'); 
    if(v) { 
      v.srcObject=camStream; 
      v.style.transform = practiceFacingMode==='user'?'scaleX(-1)':'none'; 
    } 
  } 
}

let pkFighter1 = null, pkFighter2 = null, pkState = 'idle', pkWinner = null;
function startPK() {
  if (pkFighter1.id === pkFighter2.id) return alert("自己不能和自己打哦！");
  pkState = 'fighting'; window.render();
  setTimeout(() => {
    const p1 = window.getProfilePower(pkFighter1); const p2 = window.getProfilePower(pkFighter2);
    const score1 = p1 * (1 + Math.random() * 0.1); const score2 = p2 * (1 + Math.random() * 0.1);
    pkWinner = score1 > score2 ? pkFighter1 : score2 > score1 ? pkFighter2 : null;
    pkState = 'result'; window.render();
  }, 2000);
}
function buildPKArena() {

    </div>`;
  }
  if (!pkFighter1 || !AppStore.profiles.find(p=>p.id===pkFighter1.id)) pkFighter1 = AppStore.profiles[0];
  if (!pkFighter2 || !AppStore.profiles.find(p=>p.id===pkFighter2.id)) pkFighter2 = AppStore.profiles[1];

  const renderCard = (fighter, selectId) => {
    const power = window.getProfilePower(fighter);

      best = arr[0];
    }
    const opts = AppStore.profiles.map(p => `<option value="${p.id}" ${p.id===fighter.id?'selected':''}>${window.esc(p.name)}</option>`).join('');
    
    return `<div class="glass" style="flex:1;padding:16px;text-align:center;border-radius:20px;">

      <div style="background:rgba(0,0,0,.04);border-radius:12px;padding:8px;margin-top:12px;">

  };

  return `<div style="padding:20px 16px;">

    <p style="text-align:center;font-size:12px;color:#B45309;margin-bottom:24px;">用你们收集到的幻兽对决吧！</p>
    
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:30px;">
      ${renderCard(pkFighter1, 'sel-f1')}
      <div class="fredoka" style="font-size:24px;color:#EAB308;">VS</div>
      ${renderCard(pkFighter2, 'sel-f2')}
    </div>

    <div style="text-align:center;">
      ${pkState === 'idle' ? 
        `<button class="btn" onclick="window.startPK()" style="padding:16px 40px;background:linear-gradient(135deg,#EAB308,#EC4899);color:#fff;font-size:18px;font-weight:800;border-radius:18px;box-shadow:0 8px 24px rgba(236,72,153,.3);">开始对战 👊</button>` 
        : pkState === 'fighting' ? 
        `<div class="fredoka" style="font-size:24px;color:#EC4899;animation:glowpulse 1s infinite;">能量对撞中...</div>`
        : `<div class="anim-popin">
            <h3 class="fredoka" style="font-size:32px;color:#EAB308;margin-bottom:16px;">🏆 胜者: ${pkWinner ? window.esc(pkWinner.name) : '平局'}</h3>
            <button class="btn" onclick="window.stopPK();window.render();" style="padding:10px 24px;background:none;border:2px solid #EAB308;color:#EAB308;border-radius:12px;">再来一局</button>
           </div>`
      }
    </div>
  </div>`;
}

function buildStats(){
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth(), td=now.getDate();
  const fd=new Date(y,mo,1).getDay(), dim=new Date(y,mo+1,0).getDate();
  let cal=['日','一','二','三','四','五','六'].map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;color:#B45309;">${d}</div>`).join('');
  for(let i=0;i<fd;i++) cal+=`<div class="cal-day cal-empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cal+=`<div class="cal-day ${S.checkinDays.includes(ds)?'cal-done':'cal-empty'} ${d===td?'cal-today':''}">${d}</div>`;
  }
  const ms=[
    ['第一次练琴',S.totalMinutes>0],['练习满30分钟',S.totalMinutes>=30],['练习满100分钟',S.totalMinutes>=100],
    ['收集第1只宠物',S.collectedPets.length>=1],['收集5只宠物',S.collectedPets.length>=5],
    ['连续练琴3天',S.streak>=3],['连续练琴7天',S.streak>=7],['游戏得分超500',S.gameHighScore>=500],
    ['获得稀有宠物',S.collectedPets.some(p=>['rare','epic','legend'].includes(window.petById(p.id)?.rarity))],
    ['获得史诗宠物',S.collectedPets.some(p=>['epic','legend'].includes(window.petById(p.id)?.rarity))],
  ];
  return `<div style="padding:16px;">
    <h2 class="fredoka" style="font-size:22px;color:#EC4899;margin-bottom:13px;">📊 练琴记录</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;">
      ${[['🔥','#EAB308',S.streak,'连续天数'],['⏱','#EC4899',S.totalMinutes,'累计分钟'],['🏆','#DB2777',S.gameHighScore,'游戏最高'],['🐾','#EAB308',S.collectedPets.length,'收集宠物']].map(([ico,col,val,lab])=>`
      <div class="glass" style="border-radius:15px;padding:14px;text-align:center;">
        <div style="font-size:26px;margin-bottom:3px;">${ico}</div>
        <div class="fredoka" style="font-size:28px;color:${col};">${val}</div>
        <div style="font-size:9px;color:#B45309;font-weight:700;">${lab}</div>
      </div>`).join('')}
    </div>
    <div class="glass" style="border-radius:15px;padding:13px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:9px;">📅 本月打卡</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">${cal}</div>
    </div>
    <div class="glass" style="border-radius:15px;padding:13px;margin-bottom:13px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:9px;">🎯 成就</div>
      ${ms.map(([l,d])=>`<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #FEF3C7;">
        <span style="font-size:13px;">${d?'✅':'⬜'}</span>
        <span style="font-size:11px;font-weight:600;color:${d?'#854D0E':'#D97706'};">${l}</span>
      </div>`).join('')}
    </div>
    <div style="text-align:center;">
      <button class="btn" id="reset-btn" style="padding:8px 18px;background:#FEE2E2;border:1px solid #FCA5A5;color:#EF4444;font-size:11px;border-radius:9px;">重置所有数据</button>
    </div>
  </div>`;
}

function buildTabBar(){
  if(currentView==='setup' || currentView==='profiles') return '';
  const tabs=[
    {id:'home',icon:'🏠',label:'主页'},
    {id:'practice',icon:'🎹',label:'练琴'},
    {id:'game',icon:'🎮',label:'音游'},
    {id:'dex',icon:'📖',label:'图鉴'},
    {id:'pk',icon:'⚔️',label:'竞技'}
  ];
  return `<div class="tab-inner">${tabs.map(t=>`<div class="tab-item ${currentView===t.id?'active':''}" onclick="window.navigate('${t.id}')"><span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span></div>`).join('')}</div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render(){
  const vc=document.getElementById('view-content');
  const tb=document.getElementById('tab-bar');
  if(currentView==='setup'){ vc.innerHTML=window.buildSetup(); tb.innerHTML=''; return; }
  if(currentView==='profiles'){ vc.innerHTML=window.buildProfiles(); tb.innerHTML=''; return; }
  
  const map={home:buildHome, practice:buildPractice, dex:buildDex, pk:buildPKArena, stats:buildStats,
    game:()=>gameState==='playing'?window.buildGamePlaying():gameState==='result'?window.buildGameResult():window.buildGameIdle()};
  vc.innerHTML=(map[currentView]||buildHome)();
  tb.innerHTML=buildTabBar();
  afterRender();
}

function afterRender(){
  if(currentView==='practice') window.afterPracticeRender();
  if(currentView==='game'){
    if(gameState==='playing') window.bindGameKeys();
    const backBtn=document.getElementById('back-to-idle');
    if(backBtn) backBtn.addEventListener('click',()=>{ gameState='idle'; window.render(); });
  }
  if(currentView==='pk') {
    const s1 = document.getElementById('sel-f1');
    const s2 = document.getElementById('sel-f2');
    if(s1) s1.addEventListener('change', (e) => { pkFighter1 = AppStore.profiles.find(p=>p.id===e.target.value); window.render(); });
    if(s2) s2.addEventListener('change', (e) => { pkFighter2 = AppStore.profiles.find(p=>p.id===e.target.value); window.render(); });
  }
  if(currentView==='stats'){
    const resetBtn=document.getElementById('reset-btn');
    if(resetBtn) resetBtn.addEventListener('click',()=>{ if(confirm('确定要清空所有数据？')) window.resetAll(); });
  }
}

function stopPK() { pkState = 'idle'; }

function resetAll(){
  window.stopPractice(); if(metroOn) window.stopMetro();
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; camOn=false; }
  localStorage.removeItem('piano_pet_v4_multi'); 
  AppStore = { profiles: [], activeId: null }; S = null;
  practiceSeconds=0; combo=0; sheetData=null; sheetName='';
  gameState='idle'; currentView='setup'; window.render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AI 识谱 (Gemini Vision) 带前后镜头切换
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let analyzerState = 'idle'; 
let analyzerResult = '';
let analyzerStream = null;
let analyzerFacingMode = 'environment'; // 默认后置拍谱更清晰

function openAnalyzer(){
  analyzerState = 'capturing'; analyzerResult = ''; window.refreshPractice();
  window.startAnalyzerCamera();
}
function startAnalyzerCamera() {
  if(analyzerStream){ analyzerStream.getTracks().forEach(t=>t.stop()); analyzerStream=null; }
  
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    analyzerState='error'; 
    analyzerResult='无法调用摄像头。请确保在 HTTPS (安全链接) 环境下打开，或者检查浏览器权限。'; 
    window.refreshPractice();
    return;
  }

  setTimeout(()=>{
    const v = document.getElementById('analyzer-video'); if(!v) return;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: analyzerFacingMode } } })
      .then(s => { 
        analyzerStream = s; v.srcObject = s; 
        // 只有切到前置时才翻转画面，后置拍谱必须正向显示
        v.style.transform = analyzerFacingMode === 'user' ? 'scaleX(-1)' : 'none';
      })
      .catch((err)=>{ 
        analyzerState='error'; 
        analyzerResult='无法访问摄像头: ' + err.message + '。请在手机设置中允许浏览器使用摄像头。'; 
        window.refreshPractice(); 
      });
  }, 80);
}
function switchAnalyzerCamera() {
  analyzerFacingMode = analyzerFacingMode === 'environment' ? 'user' : 'environment';
  window.startAnalyzerCamera();
}
function closeAnalyzer(){
  if(analyzerStream){ analyzerStream.getTracks().forEach(t=>t.stop()); analyzerStream=null; }
  analyzerState = 'idle'; analyzerResult = ''; window.refreshPractice();
}
async function captureAndAnalyze(){
  const v = document.getElementById('analyzer-video'); const c = document.getElementById('analyzer-canvas');
  if(!v || !c) return;
  c.width = v.videoWidth || 640; c.height = v.videoHeight || 480; 
  
  const ctx = c.getContext('2d');
  // 如果当前是前置镜头(被CSS翻转过)，在画布上画的时候也需要翻转回来，这样AI拿到的才是正向的谱子
  if(analyzerFacingMode === 'user') {
    ctx.translate(c.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(v, 0, 0, c.width, c.height);
  // 恢复画布状态
  if(analyzerFacingMode === 'user') {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  const b64 = c.toDataURL('image/jpeg', 0.85).split(',')[1];
  if(analyzerStream){ analyzerStream.getTracks().forEach(t=>t.stop()); analyzerStream=null; }
  analyzerState = 'analyzing'; window.refreshPractice();

  try {
    const resp = await fetch('/.netlify/functions/analyze', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents:[{ parts:[
        { text:`你是一个耐心温柔的儿童钢琴老师。请分析这张钢琴乐谱的照片，用10岁孩子能懂的语言，分点说明：
1. 调号和拍号是什么，用通俗的话解释
2. 这首曲子的情绪和弹奏感觉
3. 有哪2-3个需要特别注意的难点（比如跨手、连线、快速音群）
4. 给孩子一句鼓励的话
如果照片里没有清晰的五线谱，请温和地说明并请孩子重新拍摄。回答请简洁，不超过150字。` },
        { inlineData:{ mimeType:'image/jpeg', data:b64 } }
      ]}]}),
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
    analyzerResult = data.candidates?.[0]?.content?.parts?.[0]?.text || '分析失败，请重试。';
    analyzerState = 'done';
  } catch(e) { analyzerResult = `出错了：${e.message}`; analyzerState = 'error'; }
  window.refreshPractice();
}

function buildAnalyzerOverlay(){
  if(analyzerState === 'idle') return '';
  const isCapturing = analyzerState === 'capturing', isAnalyzing = analyzerState === 'analyzing', isDone = analyzerState === 'done' || analyzerState === 'error';
  return `<div style="position:fixed;inset:0;z-index:95;background:rgba(255,251,235,.97);display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.06);">
      <div><div class="fredoka" style="font-size:18px;color:#EC4899;">🎼 AI 识谱助手</div><div style="font-size:11px;color:#B45309;">由 Gemini 驱动</div></div>
      <div style="display:flex;gap:8px;">
        ${isCapturing ? `<button class="btn" onclick="window.switchAnalyzerCamera()" style="padding:8px 12px;background:rgba(0,0,0,.04);color:#B45309;font-size:12px;border-radius:10px;border:1px solid rgba(0,0,0,.05);">🔄 翻转</button>` : ''}
        <button class="btn" onclick="window.closeAnalyzer()" style="padding:8px 14px;background:#FEF3C7;color:#854D0E;font-size:12px;border-radius:10px;">✕ 关闭</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;">
      ${isCapturing ? `<div style="position:relative;border-radius:16px;overflow:hidden;background:#FDE68A;aspect-ratio:4/3;flex-shrink:0;">
          <video id="analyzer-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;display:block;"></video>
          <div style="position:absolute;inset:12%;border:2px solid rgba(236,72,153,.6);border-radius:8px;pointer-events:none;"></div>
          <div style="position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:#B45309;">将五线谱置于框内，光线充足效果更好</div>
        </div><canvas id="analyzer-canvas" style="display:none;"></canvas>
        <button class="btn" onclick="window.captureAndAnalyze()" style="width:100%;padding:15px;background:linear-gradient(135deg,#EAB308,#EC4899);color:#fff;font-size:15px;font-weight:800;border-radius:14px;">📸 拍照并分析</button>` : ''}
      ${isAnalyzing ? `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 0;"><div style="font-size:48px;" class="anim-float">🤔</div><div style="font-size:15px;font-weight:700;color:#EC4899;">AI 老师正在分析中...</div><div style="font-size:12px;color:#B45309;">请稍候几秒</div></div>` : ''}
      ${isDone ? `<div style="background:#FCE7F3;border:1px solid #FBCFE8;border-radius:16px;padding:18px;"><div style="font-size:11px;font-weight:700;color:#EC4899;margin-bottom:10px;">📋 分析结果</div><div style="font-size:13px;color:#854D0E;line-height:1.8;white-space:pre-wrap;">${window.esc(analyzerResult)}</div></div><div style="display:flex;gap:8px;"><button class="btn" onclick="window.openAnalyzer();" style="flex:1;padding:13px;background:#FFFFFF;border:1px solid #FDE68A;color:#B45309;font-size:13px;border-radius:12px;">🔄 重新拍摄</button><button class="btn" onclick="window.closeAnalyzer();" style="flex:1;padding:13px;background:#FCE7F3;border:1px solid #FBCFE8;color:#DB2777;font-size:13px;border-radius:12px;">✓ 开始练琴</button></div>` : ''}
    </div></div>`;
}

// 强制绑定所有会被 innerHTML 触发的函数到 window，解决沙盒内联事件无作用域问题
Object.assign(window,{ 
  navigate, doSetup, togglePractice, changeBpm, toggleMetro, toggleCamera, loadSheet, clearSheet, 
  doHatch, selectSong, startGame, endGame, hitLane, openAnalyzer, closeAnalyzer, captureAndAnalyze, 
  eggInteract, switchProfile, startPK, stopPK, render, afterRender, buildSetup, buildProfiles, 
  buildHome, buildPractice, buildGameIdle, buildGamePlaying, buildGameResult, buildDex, 
  buildPKArena, buildStats, buildTabBar, bindGameKeys, removeGameKeys, spawnLoop, spawnNote, 
  sweepMissed, playNoteSound, flashKey, updateGameHUD, showJudgment, getProfilePower, petById, 
  esc, hexRgb, resetAll, addXp, eggMax, xpPct, eggLevel, fmtTime, playChime, schedulePosture, 
  recordDay, showHatchModal, stopPractice, startPractice, stopMetro, startMetro, restartMetro, 
  refreshPractice, afterPracticeRender, buildEgg, buildAnalyzerOverlay,
  switchPracticeCamera, switchAnalyzerCamera, startPracticeCamera, startAnalyzerCamera
});

render();
</script>
